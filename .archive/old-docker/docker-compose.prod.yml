# ============================================
# Docker Compose for Production Deployment
# ============================================

version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: booqoo-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-booqoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-booqoo_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - booqoo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-booqoo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # BooQoo Application
  app:
    image: ${DOCKER_USERNAME}/booqoo-pos:latest
    container_name: booqoo-app-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-booqoo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-booqoo_production}?schema=public

      # NextAuth
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://booqoo.yourdomain.com}

      # Application
      NODE_ENV: production
      PORT: 3000
      APP_URL: ${APP_URL:-https://booqoo.yourdomain.com}

      # Optional: Monitoring
      # SENTRY_DSN: ${SENTRY_DSN}
    ports:
      - "3000:3000"
    networks:
      - booqoo-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: booqoo-nginx-prod
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - booqoo-network
    # Uncomment below if using Let's Encrypt
    # depends_on:
    #   - certbot

networks:
  booqoo-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
