# ==================================================
# Docker Compose untuk BooQoo POS
# Usage:
#   Local:  docker compose up --build
#   Prod:   docker compose -f docker-compose.yml --env-file .env.production up -d
# ==================================================

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: booqoo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-booqoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-booqoo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - booqoo-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-booqoo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # BooQoo Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booqoo-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-booqoo}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-booqoo}?schema=public

      # NextAuth
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}

      # Application
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      APP_URL: ${APP_URL:-http://localhost:3000}

    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - booqoo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  booqoo-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
